services:
  feeder-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: feeder-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FEEDER_DEPLOY_MODE: split
      FEEDER_DATA_DIR: /data
      PI_AGENT_URL: ${PI_AGENT_URL}
      PI_AGENT_TOKEN: ${PI_AGENT_TOKEN}
      GOTIFY_URL: ${GOTIFY_URL:-}
      GOTIFY_APP_TOKEN: ${GOTIFY_APP_TOKEN:-}
    volumes:
      - feeder-data:/data
      - ../feeder.env:/app/feeder.env:ro
    networks:
      - feeder-net

  caddy:
    image: caddy:2-alpine
    container_name: feeder-caddy
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    environment:
      PI_HOST: ${PI_HOST}
      DASHBOARD_AUTH_USER: ${DASHBOARD_AUTH_USER:-}
      DASHBOARD_AUTH_HASH: ${DASHBOARD_AUTH_HASH:-}
    volumes:
      - ./Caddyfile.active:/etc/caddy/Caddyfile:ro
      - ../dashboard:/srv/dashboard:ro
      - feeder-data:/data/feeder:ro
    depends_on:
      - feeder-api
    networks:
      - feeder-net

volumes:
  feeder-data:

networks:
  feeder-net:
